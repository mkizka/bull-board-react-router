name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - run: pnpm i
      - run: pnpm typecheck
      - run: pnpm lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - run: pnpm i
      - run: pnpm build
